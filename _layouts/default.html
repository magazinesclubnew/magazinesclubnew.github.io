<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin">
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  {% seo %}

  <!-- Fonts: Noto Serif SC (editorial) + Noto Sans SC (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- KaTeX for Math -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '\\[', right: '\\]', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false}
      ]
    });"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      corePlugins: { preflight: false },
      theme: {
        extend: {
          colors: {
            bg: 'var(--color-bg)',
            surface: 'var(--color-surface)',
            text: {
              DEFAULT: 'var(--color-text)',
              secondary: 'var(--color-text-secondary)',
              tertiary: 'var(--color-text-tertiary)',
            },
            accent: {
              DEFAULT: 'var(--color-accent)',
              hover: 'var(--color-accent-hover)',
            },
            border: {
              DEFAULT: 'var(--color-border)',
              light: 'var(--color-border-light)',
            },
          }
        }
      }
    }
  </script>
  <script>
    // Dark mode initialization (before page renders to avoid flash)
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}


  <!-- Cookie Consent & Analytics -->
  <script>
    function loadClarity() {
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "v6h4142fqg");
    }

    function acceptCookies() {
      localStorage.setItem('cookie-consent', 'accepted');
      document.getElementById('cookie-banner').style.display = 'none';
      loadClarity();
    }

    function rejectCookies() {
      localStorage.setItem('cookie-consent', 'rejected');
      document.getElementById('cookie-banner').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', function() {
      var consent = localStorage.getItem('cookie-consent');
      if (consent === 'accepted') {
        loadClarity();
      } else if (consent !== 'rejected') {
        document.getElementById('cookie-banner').style.display = 'flex';
      }
    });
  </script>
</head>
<body>
  <!-- GDPR Cookie Banner -->
  <div id="cookie-banner" class="cookie-banner" style="display: none;">
    <p>本站使用 Cookie 和分析工具来改善用户体验。继续浏览即表示您同意我们的 <a href="{{ '/privacy' | relative_url }}">隐私政策</a>。</p>
    <div class="cookie-buttons">
      <button onclick="acceptCookies()" class="cookie-accept">接受</button>
      <button onclick="rejectCookies()" class="cookie-reject">拒绝</button>
    </div>
  </div>
  <header class="site-header">
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" class="nav-title">{{ site.title }}</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/search' | relative_url }}">搜索</a>
        <a href="{{ '/about' | relative_url }}">关于</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="切换深色模式">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <main class="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}</p>
    </div>
  </footer>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
